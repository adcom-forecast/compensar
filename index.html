<style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--or:#E8470A;--or-dark:#C23D08;--or-light:#FDE8DF;--or-mid:#F07040;--dark:#1A1A1A;--dark2:#2C2C2C;--gray:#5A5A5A;--gray-light:#F5F5F5;--border:#E8E8E8;--white:#FFFFFF;--yellow:#F5C400;--blue:#1A55C0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F0F0F0;color:var(--dark);min-height:100vh}
    .navbar{background:var(--dark);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--or)}
    .nav-left{display:flex;align-items:center;gap:14px}
    .nav-comp-logo{height:32px;object-fit:contain;background:#fff;border-radius:4px;padding:2px 6px}
    .nav-adcom{display:flex;align-items:center;gap:6px; color:white; font-size: 11px; font-weight: bold;}
    .nav-adcom img{height:28px;border-radius:50%}
    .nav-right{display:flex;align-items:center;gap:10px}
    .sync-btn{background:var(--or);color:#fff;border:none;font-size:12px;font-weight:600;padding:5px 14px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:6px}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:#4CAF50;flex-shrink:0}
    .sync-dot.spin{background:var(--yellow);animation:pulse .8s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .hero{background:var(--dark2);padding:1.25rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.08)}
    .hero h1{color:#fff;font-size:20px;font-weight:700;}
    .hero p{color:rgba(255,255,255,.55);font-size:12px}
    .hero-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:1rem}
    .hkpi{background:rgba(255,255,255,.05);border-radius:8px;padding:12px 16px;border:1px solid rgba(255,255,255,.1)}
    .hkpi .lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;margin-bottom:5px}
    .hkpi .val{font-size:22px;font-weight:700;color:#fff;line-height:1}
    .hkpi.orange .val{color:var(--or)}
    .filters-bar{background:var(--dark);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1.5rem;border-bottom:1px solid rgba(255,255,255,.06);flex-wrap:wrap}
    .filter-group{display:flex;align-items:center;gap:8px}
    .filter-group label{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;}
    .chip-group{display:flex;gap:5px;}
    .chip{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15);font-size:11px;padding:4px 10px;border-radius:99px;cursor:pointer;}
    .chip.active{background:var(--or);color:#fff;border-color:var(--or)}
    .tabs{background:var(--dark);display:flex;padding:0 1.5rem;border-bottom:1px solid rgba(255,255,255,.06)}
    .tab{padding:11px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.45);border-bottom:3px solid transparent;}
    .tab.active{color:#fff;border-bottom-color:var(--or);font-weight:600}
    .container{max-width:1400px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
    .panel{display:none}.panel.active{display:block}
    .card{background:var(--white);border-radius:10px;padding:1.1rem;border:1px solid var(--border);margin-bottom:1rem}
    .card-title{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
    .card-title::before{content:'■';color:var(--or);font-size:8px}
    .tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
    .tbl{width:100%;font-size:12px;border-collapse:collapse;min-width:600px}
    .tbl thead th{font-size:11px;font-weight:700;color:#fff;text-align:left;padding:10px;background:var(--dark)}
    .tbl tbody td{padding:8px 10px;border-bottom:1px solid var(--border)}
    .tr-grand td{background:var(--dark)!important;color:#fff!important;font-weight:700}
    .badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600}
    .badge.pg{background:#FDE8DF;color:var(--or-dark)}
    .badge.pos{background:#E8F0FF;color:#1A3B8C}
    .badge.tec{background:#E8FFE8;color:#1A6B1A}
    .badge.virt{background:#EEF5FF;color:var(--blue)}
    .badge.pres{background:#F5F5F5;color:#444}
    .spin-wrap{display:flex;flex-direction:column;align-items:center;padding:5rem;gap:1rem}
    .spinner{width:32px;height:32px;border:3px solid var(--or-light);border-top-color:var(--or);border-radius:50%;animation:rotate .8s linear infinite}
    @keyframes rotate{to{transform:rotate(360deg)}}
    .g3{display:grid;grid-template-columns:repeat(3, 1fr);gap:1rem}
    .g21{display:grid;grid-template-columns:2fr 1fr;gap:1rem}
</style>
</head>
