<html lang="es">
<head>
<meta charset="UTF-8">

<title>UCompensar — Tablero de Copys 2026-2</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--purple:#6D20E5;--purple-dark:#3B0970;--orange:#FF7000;--meta:#1877F2;--google:#EA4335;--tiktok:#010101;--gray:#F4F4F4;--border:#E8E8E8}
body{font-family:'Inter',sans-serif;background:#0d0d0d;min-height:100vh}

/* HEADER */
.site-header{background:var(--purple-dark);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.5)}
.logo{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;color:#fff}
.logo span{color:var(--orange)}
.header-right{display:flex;align-items:center;gap:16px}
.counter-badge{font-size:12px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.06);padding:5px 12px;border-radius:20px}

/* FILTER BAR */
.filter-bar{background:#1a1a1a;padding:12px 32px;display:flex;gap:24px;align-items:center;border-bottom:1px solid #2a2a2a;position:sticky;top:65px;z-index:199;flex-wrap:wrap}
.filter-group{display:flex;align-items:center;gap:8px}
.filter-label{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid #333;background:transparent;color:#888;font-size:12px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap}
.filter-btn:hover{border-color:#555;color:#ccc}
.filter-btn.active-nivel-all,.filter-btn.active-medio-all{background:#333;color:#fff;border-color:#555}
.filter-btn.active-tec{background:var(--orange);color:#fff;border-color:var(--orange)}
.filter-btn.active-pre{background:var(--purple);color:#fff;border-color:var(--purple)}
.filter-btn.active-pos{background:var(--purple-dark);color:#fff;border-color:var(--purple-dark)}
.filter-btn.active-meta{background:var(--meta);color:#fff;border-color:var(--meta)}
.filter-btn.active-google{background:var(--google);color:#fff;border-color:var(--google)}
.filter-btn.active-tiktok{background:#222;color:#fff;border-color:#555}
.divider{width:1px;height:20px;background:#333}

/* MAIN */
.main{max-width:1180px;margin:0 auto;padding:24px 20px 60px;display:flex;flex-direction:column;gap:16px}

/* CARD */
.program-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.card-header{padding:14px 20px;display:flex;align-items:center;gap:12px}
.lh-tec{background:var(--orange)}
.lh-pre{background:var(--purple)}
.lh-pos{background:var(--purple-dark)}
.level-badge{font-size:9px;font-weight:700;letter-spacing:1px;color:#fff;padding:3px 8px;border-radius:4px;text-transform:uppercase;white-space:nowrap}
.prog-name{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:#fff}
.prog-mod{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}

/* MEDIO SECTIONS */
.medio-section{border-top:1px solid #F0F0F0;padding:14px 20px}
.medio-section.hidden{display:none}
.medio-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-meta{background:var(--meta)}
.dot-google{background:var(--google)}
.dot-tiktok{background:#333}
.medio-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#888}

/* META GRID */
.meta-grid{display:grid;grid-template-columns:1fr 280px;gap:10px}
.copy-box{background:#F8F9FD;border-radius:10px;padding:12px 14px;border:1px solid #E8EDF8}
.copy-tag{font-size:9px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:7px}
.copy-text{font-size:13px;color:#222;line-height:1.6}
.copy-chars{font-size:10px;color:#aaa;text-align:right;margin-top:7px}

/* GOOGLE LAYOUT */
.google-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g-block{background:#FEF5F5;border-radius:10px;padding:12px 14px;border:1px solid #FADBD8}
.headlines-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.hl-chip{font-size:11px;background:#fff;border:1px solid #FADBD8;border-radius:4px;padding:2px 7px;color:#333}
.desc-list{margin-top:6px;display:flex;flex-direction:column;gap:5px}
.desc-item{font-size:12px;color:#333;line-height:1.5;background:#fff;border-radius:6px;padding:7px 9px;border:1px solid #FADBD8}

/* TIKTOK */
.tiktok-box{background:#F2F2F2;border-radius:10px;padding:12px 14px;border:1px solid #DDD;max-width:500px}

@media(max-width:800px){
  .meta-grid,.google-wrap{grid-template-columns:1fr}
  .filter-bar{padding:10px 16px;gap:12px}
  .site-header{padding:14px 16px}
}
</style>

let filterNivel = 'all';
let filterMedio = 'all';

const nivelClass = {'Técnico laboral':'tec','Pregrado':'pre','Posgrado':'pos'};

function buildCards(){
  const main = document.getElementById('main');
  main.innerHTML = '';
  let count = 0;
  DATA.forEach((p,i) => {
    if(filterNivel !== 'all' && p.nivel !== filterNivel) return;
    count++;
    const lhClass = 'lh-'+nivelClass[p.nivel];
    const badge = p.nivel.toUpperCase();
    const metaHide = (filterMedio !== 'all' && filterMedio !== 'meta') ? 'hidden' : '';
    const googleHide = (filterMedio !== 'all' && filterMedio !== 'google') ? 'hidden' : '';
    const tiktokHide = (filterMedio !== 'all' && filterMedio !== 'tiktok') ? 'hidden' : '';

    const hlChips = p.google_headlines.map(h => `<span class="hl-chip">${h}</span>`).join('');
    const descs = p.google_descs.map(d => `<div class="desc-item">${d}</div>`).join('');
    const primaryLen = p.meta_primary.length;
    const creativeLen = p.meta_creative.length;
    const creativeOk = creativeLen >= 60 && creativeLen <= 100 ? '✅' : '⚠️';
    const tiktokLen = p.tiktok.length;
    const tiktokOk = tiktokLen <= 100 ? '✅' : '⚠️';

    main.innerHTML += `
    <div class="program-card" data-nivel="${p.nivel}" data-idx="${i}">
      <div class="card-header ${lhClass}">
        <span class="level-badge">${badge}</span>
        <div>
          <div class="prog-name">${p.programa}</div>
          <div class="prog-mod">${p.modalidad}</div>
        </div>
      </div>

      <div class="medio-section ${metaHide}" data-medio="meta">
        <div class="medio-hdr">
          <div class="dot dot-meta"></div>
          <span class="medio-name">Meta</span>
        </div>
        <div class="meta-grid">
          <div class="copy-box">
            <span class="copy-tag">Primary Text — out-of-ad</span>
            <p class="copy-text">${p.meta_primary}</p>
            <div class="copy-chars">${primaryLen} chars</div>
          </div>
          <div class="copy-box">
            <span class="copy-tag">Creative Ad — in-image (60-100 chars)</span>
            <p class="copy-text">${p.meta_creative}</p>
            <div class="copy-chars">${creativeLen} chars ${creativeOk}</div>
          </div>
        </div>
      </div>

      <div class="medio-section ${googleHide}" data-medio="google">
        <div class="medio-hdr">
          <div class="dot dot-google"></div>
          <span class="medio-name">Google Ads — RSA</span>
        </div>
        <div class="google-wrap">
          <div class="g-block">
            <span class="copy-tag">Headlines (15)</span>
            <div class="headlines-wrap">${hlChips}</div>
          </div>
          <div class="g-block">
            <span class="copy-tag">Descriptions (4)</span>
            <div class="desc-list">${descs}</div>
          </div>
        </div>
      </div>

      <div class="medio-section ${tiktokHide}" data-medio="tiktok">
        <div class="medio-hdr">
          <div class="dot dot-tiktok"></div>
          <span class="medio-name">TikTok</span>
        </div>
        <div class="tiktok-box">
          <span class="copy-tag">Caption — max 100 chars, sin emojis</span>
          <p class="copy-text">${p.tiktok}</p>
          <div class="copy-chars">${tiktokLen} chars ${tiktokOk}</div>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('counter').textContent = count+' programas';
}

function setFilter(type, value, btn){
  if(type === 'nivel'){
    filterNivel = value;
    document.querySelectorAll('.filter-group:first-child .filter-btn').forEach(b => {
      b.className = b.className.replace(/active-\S+/g,'').trim() + ' filter-btn';
    });
    const cls = value === 'all' ? 'active-nivel-all' : (value === 'Técnico laboral' ? 'active-tec' : value === 'Pregrado' ? 'active-pre' : 'active-pos');
    btn.classList.add(cls);
  } else {
    filterMedio = value;
    document.querySelectorAll('.filter-group:last-child .filter-btn').forEach(b => {
      b.className = b.className.replace(/active-\S+/g,'').trim() + ' filter-btn';
    });
    const cls = value === 'all' ? 'active-medio-all' : 'active-'+value;
    btn.classList.add(cls);
  }
  buildCards();
}

buildCards();
</script>
